<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: Arial, sans-serif;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
  }
  th, td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }
  th {
    background-color: #f2f2f2;
  }
  img {
    max-width: 100px;
    max-height: 100px;
  }
</style>
</head>
<body>


<h2>WhiteListed Item</h2>

<table>
  <tr>
    <th>Image</th>
    <th>Product Name</th>
    <th></th>
    <th></th>
    
  </tr>
  
  {% for n in obj %}
  <tr>
    <td><img src="/media/{{ n.product_image }}" alt="Product 1"></td>
    <td>{{n.product_name}}</td>
    <td> <a href="{% url 'checkoutwhitelist' n.id %}">CheckOut</a></td>
  </tr>
  {% endfor %}
  
  <!-- Add more rows as needed -->
</table>



</body>
</html>
