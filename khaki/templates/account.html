<!DOCTYPE html>
<html lang="en">

 	<head>
 		<!-- Meta Tags -->
		<meta charset="UTF-8">
		<meta name="author" content="Kamran Mubarik">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- Title -->
 		<title>E-Commerce Online Shop</title>
 		<!-- Style Sheet -->
		<link rel="stylesheet" type="text/css" href="/static/css/style.css" />
		<!-- Javascript -->	
		<script type="text/javascript" src="/static/js/jquery.min.js"></script>
 	</head>
<body>
	<!--header section start-->
	{% extends 'base.html' %}
	<!-- header -->
	
	{% block content %}
		
	
		

	<div class="container">
		<main>
			<div class="breadcrumb">
				<ul>
					<li><a href="{% url 'home' %}">Home</a></li>
					<li> / </li>
					<li>Account</li>
				</ul>
			</div> <!-- End of Breadcrumb-->
			
			<div class="account-page">
				<div class="profile">
					<div class="profile-img">
						<img src="/media/{{ user.profile_image }}">
						<h2>{{user.first_name}} {{user.last_name}}</h2>
						<p>{{user.email}}</p>
					</div>
					<ul>
						<li><a href="{% url 'account' %}" class="active">Account <span>></span></a></li>
						<li><a href="{% url 'orders' %}">My Orders <span>></span></a></li>
						<li><a href="{% url 'changepassword' %}">Change Password <span>></span></a></li>
						<li><a href="{% url 'logout' %}">Logout <span>></span></a></li>
					</ul>
				</div>
				<div class="account-detail">
					<h2>Account</h2>
					<div class="billing-detail">					
						<form class="checkout-form" method="POST">
							{% csrf_token %}
							<div class="form-inline">
								<div class="form-group">
									<label>First Name</label>
									<input type="text" id="fname" name="fname" value="{{ user.first_name }}" required="">
								</div>
								<div class="form-group">
									<label>Last Name</label>
									<input type="text" id="lname" name="lname" value="{{ user.last_name }}" required="">
								</div>
							</div>
							<div class="form-group">
								<label>Email</label>
								<input type="email" id="cname" name="email" value="{{ user.email }}" required="">
							</div>
							<div class="form-inline">
								<div class="form-group">
									<label>Country</label>
									<select id="country" name="country" required="">
										<option selected>{{user.country}}</option>
										<option value="Nepal">Nepal</option>
									</select>
								</div>
								<div class="form-group">
									<label>City</label>
									<select id="city" name="city" required="" >
										<option selected>{{user.city}}</option>
										<option value="Kathmandu">Kathmandu</option>
									</select>
								</div>
							</div>
							<div class="form-group">
								<label>Address</label>
								<textarea style="resize:none" id="address" name="address" rows="3" required="">{{user.address}}</textarea>
							</div>
							<div class="form-inline">					
								<div class="form-group">
									<label>Tel</label>
									<input type="number" id="tel" name="tel" minlength="11" maxlength="11" value="{{ user.tel }}" required="">
								</div>
								<div class="form-group">
									<label>Mobile</label>
									<input type="number" id="mobile" name="mobile" minlength="11" maxlength="11" value="{{ user.mobile }}" required="">
								</div>
							</div>
							<div class="form-group">
								<label></label>
								<input type="submit" name="update" value="Update">
							</div>
						</form>		
					</div>
				</div>				
			</div>		
		</main> <!-- Main Area -->
	</div>
	{% endblock content %}

	<!-- Footer Area -->

</body>

</html>
